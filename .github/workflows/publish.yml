name: Publish (npm)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Pack tarball (no-token install)
        run: |
          TARBALL="$(npm pack --silent)"
          mv "$TARBALL" web-search.tgz

      - name: Create GitHub Release + upload tarball
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web-search.tgz
          generate_release_notes: true

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
